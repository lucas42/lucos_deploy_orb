description: "Calculates version, tags the repo, creates a GitHub Release, and halts if no release is needed."
steps:
  - run:
      name: Calculate and tag version
      command: |
        set -euo pipefail

        # Get the latest version tag (local — zero API calls)
        LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)

        if [ -z "$LATEST_TAG" ]; then
          # No tags yet — first release
          NEXT_VERSION="1.0.0"
          COMMIT_RANGE="HEAD"
        else
          # If HEAD is already tagged, there's nothing new to release
          if git describe --exact-match --tags HEAD 2>/dev/null | grep -q '^v'; then
            echo "HEAD is already tagged at $LATEST_TAG. Nothing to release."
            circleci-agent step halt
            exit 0
          fi

          PREV_MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
          PREV_PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)
          COMMIT_RANGE="${LATEST_TAG}..HEAD"

          # Check for breaking changes (local — zero API calls)
          if git log "${COMMIT_RANGE}" --format=%B | grep -qE 'BREAKING CHANGE|^[a-z]+(\([^)]*\))?!:'; then
            NEXT_VERSION="$((PREV_MAJOR + 1)).0.0"
          else
            NEXT_VERSION="${PREV_MAJOR}.0.$((PREV_PATCH + 1))"
          fi
        fi

        # On non-main branches, append a pre-release suffix so Docker image tags
        # don't clash with future official releases on main.
        if [ "$CIRCLE_BRANCH" != "main" ]; then
          NEXT_VERSION="${NEXT_VERSION}-pre.${CIRCLE_SHA1:0:7}"
          echo "Branch build — using pre-release version: v${NEXT_VERSION}"
          echo "export NEXT_VERSION=${NEXT_VERSION}" >> "$BASH_ENV"
          echo "Skipping git tag push and GitHub Release creation on non-main branch."
          exit 0
        fi

        echo "Next version: v${NEXT_VERSION}"
        echo "export NEXT_VERSION=${NEXT_VERSION}" >> "$BASH_ENV"

        # Push tag via HTTPS with token (git protocol, not GraphQL)
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
        git tag "v${NEXT_VERSION}"
        git push origin "v${NEXT_VERSION}"

        # Create GitHub Release via one REST API call
        RELEASE_BODY=$(git log "${COMMIT_RANGE}" --format="* %s" 2>/dev/null || echo "Initial release")
        curl -sf \
          -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/releases" \
          -d "$(jq -n --arg tag "v${NEXT_VERSION}" --arg body "${RELEASE_BODY}" \
            '{"tag_name": $tag, "name": $tag, "body": $body}')"
