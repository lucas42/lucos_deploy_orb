description: "Builds and pushes all images defined in docker compose."
parameters:
  port:
    type: string
    default: ""
  platform:
    type: string
    default: ""
    description: >
      Comma-separated list of platforms to build for (e.g. "linux/amd64,linux/arm64").
      Leave empty for single-platform (host architecture) builds.
  mirror_url:
    type: string
    default: "docker.l42.eu"
    description: >
      Host (and optional port) of the Docker registry mirror used as a pull-through cache.
      Override in tests to point at a local registry:2 instance (e.g. "localhost:5001").
  mirror_insecure:
    type: boolean
    default: false
    description: >
      Set to true to probe and log in to the mirror over HTTP instead of HTTPS, and to
      configure BuildKit to allow insecure connections to the mirror.
      Required when mirror_url points at an HTTP-only registry (e.g. a local test instance).
  remote_docker:
    type: boolean
    default: true
    description: >
      Set to false when running on a machine executor where Docker is already available.
      When true (default), setup_remote_docker is called to provision a remote Docker daemon.
steps:
  - when:
      condition: << parameters.remote_docker >>
      steps:
        - setup_remote_docker
  - when:
      condition: << parameters.platform >>
      steps:
        - run:
            name: Install QEMU emulators
            command: |
              docker run --privileged --rm tonistiigi/binfmt --install all
  - run:
      name: Configure BuildKit registry mirror
      command: |
        MIRROR_SCHEME=https
        if [ "<< parameters.mirror_insecure >>" = "true" ]; then
          MIRROR_SCHEME=http
        fi
        echo "Probing mirror: << parameters.mirror_url >>..."
        MIRROR_HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 ${MIRROR_SCHEME}://<< parameters.mirror_url >>/v2/ 2>/dev/null || echo "000")
        if [ "$MIRROR_HTTP_CODE" != "000" ]; then
          echo "Mirror is reachable (HTTP $MIRROR_HTTP_CODE), configuring BuildKit to use it."
          printf '[registry."docker.io"]\n  mirrors = ["<< parameters.mirror_url >>"]\n' > /tmp/buildkitd.toml
          if [ "<< parameters.mirror_insecure >>" = "true" ]; then
            printf '[registry."<< parameters.mirror_url >>"]\n  http = true\n  insecure = true\n' >> /tmp/buildkitd.toml
          fi
          docker buildx create --use --name builder --config /tmp/buildkitd.toml
          echo 'MIRROR_AVAILABLE=true' >> "$BASH_ENV"
        else
          echo "Mirror probe failed — falling back to direct Docker Hub pulls."
          docker buildx create --use --name builder
          echo 'MIRROR_AVAILABLE=false' >> "$BASH_ENV"
        fi
  - run:
      name: Docker Login
      command: |
        source $BASH_ENV
        echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  - run:
      name: Docker Login (mirror)
      max_auto_reruns: 2
      auto_rerun_delay: 5s
      command: |
        source $BASH_ENV
        if [ "$MIRROR_AVAILABLE" != "true" ]; then
          echo "Mirror unavailable — skipping mirror login."
          exit 0
        fi
        echo "$DOCKER_MIRROR_ACCESS_TOKEN" | docker login --username "$DOCKER_MIRROR_USERNAME" --password-stdin << parameters.mirror_url >>
  - run:
      name: Docker Build & Push
      command: |
        source $BASH_ENV
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        SET_ARGS=()
        TARGETS=()
        while IFS='|' read -r service img; do
          TARGETS+=("$service")
          IMG_BASE="${img%:*}"
          SET_ARGS+=(--set "${service}.tags=${IMG_BASE}:${VERSION}")
          if [ "$CIRCLE_BRANCH" = "main" ]; then
            SET_ARGS+=(--set "${service}.tags+=${IMG_BASE}:latest")
          fi
        done < <(docker compose config --format json | jq -r '.services | to_entries[] | select(.value.build) | "\(.key)|\(.value.image)"')
        if [ "${#TARGETS[@]}" -eq 0 ]; then
          echo "ERROR: no services with a 'build:' block found in docker-compose.yml — nothing to bake." >&2
          exit 1
        fi
        echo "Baking targets: ${TARGETS[*]}"
        BAKE_ARGS=("${SET_ARGS[@]}")
        if [ -n "<< parameters.platform >>" ]; then
          BAKE_ARGS+=(--set "*.platform=<< parameters.platform >>")
        fi
        BAKE_ARGS+=(--set "*.args.VERSION=$VERSION" --push -f docker-compose.yml "${TARGETS[@]}")

        # Retry the bake/push only on known-transient registry push errors (e.g.
        # "blob unknown to registry", the BuildKit/Docker Hub push-consistency race).
        # A genuine build failure does not match these patterns and fails fast, so a
        # real defect is never masked or tripled in runtime. See lucos_deploy_orb#182.
        MAX_ATTEMPTS=3
        TRANSIENT_RE='blob unknown to registry|manifest blob unknown|error reading from server|unexpected EOF'
        attempt=1
        while true; do
          echo "=== Docker Build & Push: attempt ${attempt}/${MAX_ATTEMPTS} ==="
          set +e
          docker buildx bake "${BAKE_ARGS[@]}" 2>&1 | tee /tmp/bake_output.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Docker Build & Push succeeded on attempt ${attempt}."
            break
          fi
          if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
            echo "Docker Build & Push failed after ${attempt} attempts (exit ${rc}) — giving up." >&2
            exit "$rc"
          fi
          if grep -Eiq "$TRANSIENT_RE" /tmp/bake_output.log; then
            backoff=$((attempt * 5))
            echo "Transient registry push error detected — retrying in ${backoff}s (attempt $((attempt + 1))/${MAX_ATTEMPTS})..." >&2
            sleep "$backoff"
            attempt=$((attempt + 1))
          else
            echo "Non-transient failure (exit ${rc}) — not a known transient push error; failing fast without retry." >&2
            exit "$rc"
          fi
        done
      no_output_timeout: 30m
