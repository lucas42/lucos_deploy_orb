description: "Builds and pushes all images defined in docker compose."
parameters:
  port:
    type: string
    default: ""
steps:
  - setup_remote_docker
  - run:
      name: Configure BuildKit registry mirror
      command: |
        cat > /tmp/buildkitd.toml << 'EOF'
        [registry."docker.io"]
          mirrors = ["docker.l42.eu"]
        EOF
        docker buildx create --use --name builder --config /tmp/buildkitd.toml
  - run:
      name: Docker Login
      command: |
        source $BASH_ENV
        echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  - run:
      name: Docker Login (mirror)
      command: |
        source $BASH_ENV
        echo "$DOCKER_MIRROR_ACCESS_TOKEN" | docker login --username "$DOCKER_MIRROR_USERNAME" --password-stdin docker.l42.eu
  - run:
      name: Docker Build & Push (Versioned)
      command: |
        source $BASH_ENV
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        docker buildx bake --set "*.args.VERSION=$VERSION" --push -f docker-compose.yml
  - run:
      name: Docker Tag & Push (Latest)
      command: |
        source $BASH_ENV
        if [ "$CIRCLE_BRANCH" != "main" ]; then
          echo "Skipping :latest tag push on non-main branch ($CIRCLE_BRANCH)"
          exit 0
        fi
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        docker compose config --format json | jq -r '.services[] | select(.build) | .image' | while read img; do
          LATEST="${img%:*}:latest"
          docker tag "$img" "$LATEST"
          docker push "$LATEST"
        done
