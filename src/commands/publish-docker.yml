description: "Builds and pushes all images defined in docker compose."
parameters:
  port:
    type: string
    default: ""
  platform:
    type: string
    default: ""
    description: >
      Comma-separated list of platforms to build for (e.g. "linux/amd64,linux/arm64").
      Leave empty for single-platform (host architecture) builds.
steps:
  - setup_remote_docker
  - when:
      condition: << parameters.platform >>
      steps:
        - run:
            name: Install QEMU emulators
            command: |
              docker run --privileged --rm tonistiigi/binfmt --install all
  - run:
      name: Create BuildKit builder
      command: docker buildx create --use --name builder
  - run:
      name: Docker Login
      command: |
        source $BASH_ENV
        echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  - run:
      name: Docker Build & Push
      command: |
        source $BASH_ENV
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        SET_ARGS=()
        while IFS='|' read -r service img; do
          IMG_BASE="${img%:*}"
          SET_ARGS+=(--set "${service}.tags=${IMG_BASE}:${VERSION}")
          if [ "$CIRCLE_BRANCH" = "main" ]; then
            SET_ARGS+=(--set "${service}.tags+=${IMG_BASE}:latest")
          fi
        done < <(docker compose config --format json | jq -r '.services | to_entries[] | select(.value.build) | "\(.key)|\(.value.image)"')
        if [ -n "<< parameters.platform >>" ]; then
          docker buildx bake \
            "${SET_ARGS[@]}" \
            --set "*.platform=<< parameters.platform >>" \
            --set "*.args.VERSION=$VERSION" \
            --push \
            -f docker-compose.yml
        else
          docker buildx bake \
            "${SET_ARGS[@]}" \
            --set "*.args.VERSION=$VERSION" \
            --push \
            -f docker-compose.yml
        fi
      no_output_timeout: 30m
