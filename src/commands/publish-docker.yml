description: "Builds and pushes all images defined in docker compose."
parameters:
  port:
    type: string
    default: ""
  platform:
    type: string
    default: ""
    description: >
      Comma-separated list of platforms to build for (e.g. "linux/amd64,linux/arm64").
      Leave empty for single-platform (host architecture) builds.
  force-latest:
    type: boolean
    default: false
    description: >
      When true, push the :latest tag regardless of branch. Intended for
      use in CI test jobs that run on feature branches.
steps:
  - setup_remote_docker
  - when:
      condition: << parameters.platform >>
      steps:
        - run:
            name: Install QEMU emulators
            command: |
              docker run --privileged --rm tonistiigi/binfmt --install all
  - run:
      name: Configure BuildKit registry mirror
      command: |
        echo "Probing mirror: docker.l42.eu..."
        MIRROR_RESPONSE=$(curl -fsS --max-time 5 https://docker.l42.eu/v2/ 2>&1 || true)
        if echo "$MIRROR_RESPONSE" | grep -q '{'; then
          echo "Mirror is available, configuring BuildKit to use it."
          printf '[registry."docker.io"]\n  mirrors = ["docker.l42.eu"]\n' > /tmp/buildkitd.toml
          docker buildx create --use --name builder --config /tmp/buildkitd.toml
          echo 'MIRROR_AVAILABLE=true' >> "$BASH_ENV"
        else
          echo "Mirror probe failed — falling back to direct Docker Hub pulls."
          echo "Probe response: $MIRROR_RESPONSE"
          docker buildx create --use --name builder
          echo 'MIRROR_AVAILABLE=false' >> "$BASH_ENV"
        fi
  - run:
      name: Docker Login
      command: |
        source $BASH_ENV
        echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  - run:
      name: Docker Login (mirror)
      command: |
        source $BASH_ENV
        if [ "$MIRROR_AVAILABLE" != "true" ]; then
          echo "Mirror unavailable — skipping mirror login."
          exit 0
        fi
        echo "$DOCKER_MIRROR_ACCESS_TOKEN" | docker login --username "$DOCKER_MIRROR_USERNAME" --password-stdin docker.l42.eu
  - run:
      name: Docker Build & Push (Versioned)
      command: |
        source $BASH_ENV
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        if [ -n "<< parameters.platform >>" ]; then
          docker buildx bake \
            --set "*.platform=<< parameters.platform >>" \
            --set "*.args.VERSION=$VERSION" \
            --push \
            -f docker-compose.yml
        else
          docker buildx bake --set "*.args.VERSION=$VERSION" --push -f docker-compose.yml
        fi
      no_output_timeout: 30m
  - run:
      name: Docker Tag & Push (Latest)
      command: |
        source $BASH_ENV
        if [ "$CIRCLE_BRANCH" != "main" ] && [ "<< parameters.force-latest >>" != "true" ]; then
          echo "Skipping :latest tag push on non-main branch ($CIRCLE_BRANCH)"
          exit 0
        fi
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        docker compose config --format json | jq -r '.services[] | select(.build) | .image' | while read img; do
          LATEST="${img%:*}:latest"
          docker buildx imagetools create -t "$LATEST" "$img"
        done
      no_output_timeout: 30m
