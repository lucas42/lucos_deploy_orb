description: "Builds and pushes multi-platform Docker images using docker buildx bake."
parameters:
  port:
    type: string
    default: ""
steps:
  - setup_remote_docker
  - run:
      name: Install QEMU emulators
      command: |
        docker run --privileged --rm tonistiigi/binfmt --install all
  - run:
      name: Create buildx builder
      command: |
        docker buildx create --use --name multiplatform-builder
  - run:
      name: Docker Login
      command: |
        source $BASH_ENV
        echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  - run:
      name: Build & Push Multi-Platform Image (Versioned)
      command: |
        source $BASH_ENV
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        STAGE_ALIASES=$(find . -maxdepth 4 -name "Dockerfile" 2>/dev/null \
          | xargs -r awk 'toupper($1)=="FROM" { for(i=3;i<=NF;i++) if(toupper($i)=="AS") print tolower($(i+1)) }' \
          | sort -u | tr '\n' ' ')
        SET_ARGS=(--set "*.platform=linux/amd64,linux/arm64" --set "*.args.VERSION=$VERSION")
        while IFS= read -r img; do
          [ "$img" = "scratch" ] && continue
          case "$img" in \$*) continue ;; esac
          for alias in $STAGE_ALIASES; do
            [ "$img" = "$alias" ] && continue 2
          done
          SET_ARGS+=(--set "*.contexts.${img}=docker-image://ghcr.io/lucas42/mirror/${img}")
        done < <(find . -maxdepth 4 -name "Dockerfile" 2>/dev/null \
          | xargs -r awk 'toupper($1)=="FROM" { img=$2; if (img ~ /^--/) img=$3; print tolower(img) }' \
          | sort -u)
        docker buildx bake "${SET_ARGS[@]}" --push -f docker-compose.yml
      no_output_timeout: 30m
  - run:
      name: Tag & Push Multi-Platform Image (Latest)
      command: |
        source $BASH_ENV
        if [ "$CIRCLE_BRANCH" != "main" ]; then
          echo "Skipping :latest tag push on non-main branch ($CIRCLE_BRANCH)"
          exit 0
        fi
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        docker compose config --format json | jq -r '.services[] | select(.build) | .image' | while read img; do
          LATEST="${img%:*}:latest"
          docker buildx imagetools create -t "$LATEST" "$img"
        done
      no_output_timeout: 30m
