description: "Builds and pushes multi-platform Docker images using docker buildx bake."
parameters:
  port:
    type: string
    default: ""
steps:
  - setup_remote_docker
  - run:
      name: Install QEMU emulators
      command: |
        docker run --privileged --rm tonistiigi/binfmt --install all
  - run:
      name: Configure BuildKit registry mirror
      command: |
        cat > /tmp/buildkitd.toml << 'EOF'
        [registry."docker.io"]
          mirrors = ["docker.l42.eu"]
        EOF
  - run:
      name: Create buildx builder
      command: |
        docker buildx create --use --name multiplatform-builder --config /tmp/buildkitd.toml
  - run:
      name: Docker Login
      command: |
        source $BASH_ENV
        echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  - run:
      name: Docker Login (mirror)
      command: |
        source $BASH_ENV
        echo "$DOCKER_MIRROR_ACCESS_TOKEN" | docker login --username "$DOCKER_MIRROR_USERNAME" --password-stdin docker.l42.eu
  - run:
      name: Build & Push Multi-Platform Image (Versioned)
      command: |
        source $BASH_ENV
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        docker buildx bake \
          --set "*.platform=linux/amd64,linux/arm64" \
          --set "*.args.VERSION=$VERSION" \
          --push \
          -f docker-compose.yml
      no_output_timeout: 30m
  - run:
      name: Tag & Push Multi-Platform Image (Latest)
      command: |
        source $BASH_ENV
        if [ "$CIRCLE_BRANCH" != "main" ]; then
          echo "Skipping :latest tag push on non-main branch ($CIRCLE_BRANCH)"
          exit 0
        fi
        [ -n "<< parameters.port >>" ] && export PORT="<< parameters.port >>"
        docker compose config --format json | jq -r '.services[] | select(.build) | .image' | while read img; do
          LATEST="${img%:*}:latest"
          docker buildx imagetools create -t "$LATEST" "$img"
        done
      no_output_timeout: 30m
