description: "Pushes a git tag and creates a GitHub Release for the current version. No-ops on non-main branches. Must run after all publish steps so the tag only exists once a good artifact is available."
steps:
  - run:
      name: Push git tag and create GitHub Release
      command: |
        source $BASH_ENV

        if [ "$CIRCLE_BRANCH" != "main" ]; then
          echo "Non-main branch — skipping git tag push and GitHub Release."
          exit 0
        fi

        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"

        # Determine commit range for release notes.
        # Exclude v${VERSION} itself in case a prior partial run pushed it (rerun safety).
        PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v "^v${VERSION}$" | head -1)
        if [ -z "$PREV_TAG" ]; then
          COMMIT_RANGE_NOTES="HEAD"
        else
          COMMIT_RANGE_NOTES="${PREV_TAG}..HEAD"
        fi

        # Push git tag — idempotent: skip if already on this commit, fail loudly if on a different commit.
        # Use ^{} dereference to get commit SHA for annotated tags; tail -1 selects it when present.
        REMOTE_TAG_SHA=$(git ls-remote origin "refs/tags/v${VERSION}" "refs/tags/v${VERSION}^{}" 2>/dev/null | awk '{print $1}' | tail -1)

        if [ -n "$REMOTE_TAG_SHA" ]; then
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$REMOTE_TAG_SHA" = "$CURRENT_SHA" ]; then
            echo "Tag v${VERSION} already exists on origin pointing to current HEAD — skipping push (likely a rerun)."
          else
            echo ""
            echo "FATAL: git tag v${VERSION} already exists on origin, pointing to ${REMOTE_TAG_SHA},"
            echo "but the current build is for ${CURRENT_SHA}."
            echo ""
            echo "The Docker image has already been pushed to Docker Hub tagged ${VERSION}"
            echo "for ${CURRENT_SHA}. Git and Docker Hub state have diverged."
            echo ""
            echo "Manual investigation required — do NOT simply rerun this job."
            echo "Likely causes: manual out-of-band tag push; orphaned tag from a"
            echo "previous half-failed pipeline; concurrent build race (check that"
            echo "serial-group is configured on this repo's workflow, see #131)."
            exit 1
          fi
        else
          git tag -d "v${VERSION}" 2>/dev/null || true
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
        fi

        # Create GitHub Release — idempotent: skip if already exists.
        release_status=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/releases/tags/v${VERSION}")

        if [ "$release_status" -eq 200 ]; then
          echo "GitHub Release for v${VERSION} already exists — skipping creation (likely a rerun)."
        else
          RELEASE_BODY=$(git log "${COMMIT_RANGE_NOTES}" --format="* %s" 2>/dev/null || echo "Initial release")
          resp_file=$(mktemp)
          http_status=$(curl -s -o "$resp_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/releases" \
            -d "$(jq -n --arg tag "v${VERSION}" --arg body "$RELEASE_BODY" \
              '{"tag_name": $tag, "name": $tag, "body": $body}')")

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "---- GitHub Release API failed with HTTP $http_status ----"
            cat "$resp_file"
            rm -f "$resp_file"
            exit 1
          fi
          rm -f "$resp_file"
        fi
