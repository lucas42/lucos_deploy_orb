parameters:
  host-domain:
    type: string
  ssh-port:
    type: integer
    default: 22
  architecture:
    type: string
    default: ""
    description: >
      Architecture tag used when pulling architecture-specific images
      (e.g. "amd64", "arm64", "armv7l"). Leave empty for services using
      multi-platform manifests — Docker will resolve the correct platform
      automatically.
steps:
  - run:
      name: Set host domain
      command: echo "Deploying onto host \"<< parameters.host-domain >>\""
  - checkout
  - add_ssh_keys:
      fingerprints:
        - "b7:75:7e:64:66:44:40:06:95:b4:ad:cd:07:a7:6f:08"
  - run:
      name: Populate known_hosts
      command: |
        ssh-keyscan -p << parameters.ssh-port >> -H << parameters.host-domain >> >> ~/.ssh/known_hosts
        # Only scan creds.l42.eu if we'll actually need to connect to it.
        # Skip if both the production envfile and the monitoring key are pre-supplied
        # via environment variables (e.g. for self-deploying services like lucos_creds).
        if [ -z "$LUCOS_DEPLOY_ENV_BASE64" ] || ! env | grep -q "^KEY_LUCOS_MONITORING="; then
          ssh-keyscan -p 2202 -H creds.l42.eu >> ~/.ssh/known_hosts
        fi
      max_auto_reruns: 5
      auto_rerun_delay: 30s
  - run:
      name: Fetch production envfile
      command: |
        if [ -n "$LUCOS_DEPLOY_ENV_BASE64" ]; then
          echo "Using pre-supplied production envfile from LUCOS_DEPLOY_ENV_BASE64"
          printf '%s' "$LUCOS_DEPLOY_ENV_BASE64" | base64 -d > .env
        else
          scp -s -P 2202 -o BatchMode=yes docker-deploy@creds.l42.eu:$CIRCLE_PROJECT_REPONAME/production/.env .
        fi
      max_auto_reruns: 5
      auto_rerun_delay: 30s
  - run:
      name: Validate envfile contains PORT (if required)
      command: |
        if grep -qE '\$\{?PORT\}?' docker-compose.y*ml; then
          PORT_VALUE=$(grep -E '^PORT=' .env | cut -d= -f2)
          if [ -z "$PORT_VALUE" ]; then
            echo "ERROR: PORT is referenced in docker-compose.yml but not set in .env — aborting deploy"
            exit 1
          fi
        fi
  - run:
      name: Pull container(s) onto remote box

      # HACK: Not specifying a service should pull all services
      # However, this is failing in docker compose v2.10.2 in a difficult-to-debug manner
      # As a workaround, parse the list of services from the config file pull each service one-by-one
      command: |
        yq '.services | keys' docker-compose.y*ml | tr -d '-' | while read service
        do
          DOCKER_HOST="ssh://docker-deploy@<< parameters.host-domain >>:<< parameters.ssh-port >>" \
          ARCH=<< parameters.architecture >> \
          docker compose pull $service
        done
  - run:
      name: Fetch deploy infrastructure credentials
      command: |
        if env | grep -q "^KEY_LUCOS_MONITORING="; then
          echo "KEY_LUCOS_MONITORING already set — skipping infrastructure credential fetch from creds.l42.eu"
        else
          scp -s -P 2202 -o BatchMode=yes docker-deploy@creds.l42.eu:lucos_deploy_orb/deploy/.env /dev/stdout >> "$BASH_ENV" || \
            echo "WARNING: could not fetch deploy infrastructure credentials from creds.l42.eu — monitoring suppression will be skipped"
        fi
  - run:
      name: Suppress monitoring alerts during deploy
      command: |
        curl -X PUT https://monitoring.l42.eu/suppress/$CIRCLE_PROJECT_REPONAME \
          -H "Authorization: Bearer $KEY_LUCOS_MONITORING" \
          --max-time 5 || true
  - run:
      name: Stop host-networked services before recreating
      command: |
        # Services using network_mode: host bind directly to the host's network stack, so
        # the new container races the old one for the same port. Stop the old container first
        # to avoid the eaddrinuse crash-loop that --wait catches as a failed deploy.
        # Bridge-networked services can coexist briefly during rolling update; skip this step.
        HOST_SERVICES=$(yq '.services | to_entries | map(select(.value.network_mode == "host")) | .[].key' docker-compose.y*ml 2>/dev/null | tr '\n' ' ')
        if [ -n "$HOST_SERVICES" ]; then
          echo "network_mode: host detected — stopping existing container(s) before up: $HOST_SERVICES"
          DOCKER_HOST="ssh://docker-deploy@<< parameters.host-domain >>:<< parameters.ssh-port >>" \
          COMPOSE_PROJECT_NAME=$CIRCLE_PROJECT_REPONAME \
          docker compose stop $HOST_SERVICES
        else
          echo "No host-networked services detected — skipping stop step"
        fi
  - run:
      name: Deploy using docker compose
      command: |
        DOCKER_HOST="ssh://docker-deploy@<< parameters.host-domain >>:<< parameters.ssh-port >>" \
        COMPOSE_PROJECT_NAME=$CIRCLE_PROJECT_REPONAME \
        ARCH=<< parameters.architecture >> \
        PRODUCTION=true \
        HOSTDOMAIN=<< parameters.host-domain >> \
        docker compose up -d --no-build --wait --wait-timeout 120
      max_auto_reruns: 2
      auto_rerun_delay: 15s
  - run:
      name: Prune unused Docker images
      command: |
        DOCKER_HOST="ssh://docker-deploy@<< parameters.host-domain >>:<< parameters.ssh-port >>" \
        docker image prune -f || true
  - run:
      name: Delete envfile
      command: |
        rm -f .env
  - run:
      name: Send deploy log to loganne
      # Loganne often fails to respond in time if it itself (or lucos_router) has just been
      # deployed and hasn't yet finished starting up.  On fail, wait 30 secs and try again.
      command: |
        curl https://loganne.l42.eu/events --data '{
          "type":"deploySystem",
          "source":"lucos_deploy_orb",
          "systemDeployed":"'"$CIRCLE_PROJECT_REPONAME"'",
          "deployTarget":"<< parameters.host-domain >>",
          "sshPort":"<< parameters.ssh-port >>",
          "humanReadable":"Deployed '"$CIRCLE_PROJECT_REPONAME"' to << parameters.host-domain >>"
        }' -H "Content-Type: application/json" --fail
      max_auto_reruns: 5
      auto_rerun_delay: 30s
