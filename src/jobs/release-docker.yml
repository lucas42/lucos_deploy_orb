parameters:
  platform:
    type: string
    default: "linux/amd64,linux/arm64"
    description: >
      Comma-separated list of platforms to build for. Defaults to multi-platform
      (linux/amd64,linux/arm64). Pass a single platform (e.g. "linux/amd64") to
      skip cross-compilation — useful for images whose final stage is FROM scratch
      with platform-independent content (e.g. data files), where QEMU emulation
      adds significant build time with no benefit to image consumers.
docker:
  - image: cimg/node:current
steps:
  - checkout
  - fetch-publish-creds
  - generate-github-token
  - calc-version
  - publish-docker:
      platform: << parameters.platform >>
  - push-release-tag
  - loganne-publish:
      tech: "dockerhub"
