description: >
  DEPRECATED: Use the `build` job instead (with no platform parameter for amd64-only builds).
  This job will be removed in a future release.
# This doesn't call out to another box because circleci runs on amd64
environment:
  ARCH: amd64
docker:
  - image: cimg/node:current
steps:
  - checkout
  - fetch-publish-creds
  - generate-github-token
  - calc-version
  - publish-docker:
      port: "1234"
  - push-release-tag
