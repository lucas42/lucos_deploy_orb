docker:
  - image: cimg/android:2025.01-node
steps:
  - checkout
  - add_ssh_keys:
      fingerprints:
        - "b7:75:7e:64:66:44:40:06:95:b4:ad:cd:07:a7:6f:08"
  - fetch-publish-creds
  - run:
      name: Fetch production envfile
      command: |
        scp -s -P 2202 -o BatchMode=yes docker-deploy@creds.l42.eu:$CIRCLE_PROJECT_REPONAME/production/.env .
      max_auto_reruns: 5
      auto_rerun_delay: 30s
  - calc-version
  - run:
      name: Decode keystore
      command: |
        set -a && source .env && set +a
        echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/android-release.keystore
  - run:
      name: Build and sign release APK
      command: |
        source $BASH_ENV
        set -a && source .env && set +a
        export ANDROID_KEYSTORE_FILE=/tmp/android-release.keystore
        export APP_VERSION=$NEXT_VERSION
        ./gradlew assembleRelease
  - run:
      name: Remove keystore
      command: rm -f /tmp/android-release.keystore
      when: always
  - run:
      name: Upload APK to GitHub Release
      command: |
        source $BASH_ENV
        APK_PATH="app/build/outputs/apk/release/app-release.apk"
        RELEASE_ID=$(curl -sf -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/tags/v$NEXT_VERSION" \
          | jq -r '.id')
        curl -sf -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/vnd.android.package-archive" \
          --data-binary @"$APK_PATH" \
          "https://uploads.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/$RELEASE_ID/assets?name=$CIRCLE_PROJECT_REPONAME-v$NEXT_VERSION.apk"
      max_auto_reruns: 5
      auto_rerun_delay: 30s
  - loganne-publish:
      tech: "GitHub Release"
