description: >
  DEPRECATED: Use the `build` job instead with platform: "linux/amd64,linux/arm64".
  This job will be removed in a future release.
  Previously: Builds multi-platform Docker images (linux/amd64, linux/arm64)
  using docker buildx with QEMU emulation and pushes a multi-platform manifest
  to Docker Hub.
docker:
  - image: cimg/node:current
steps:
  - checkout
  - fetch-publish-creds
  - generate-github-token
  - calc-version
  - publish-docker:
      port: "1234"
      platform: "linux/amd64,linux/arm64"
  - push-release-tag
