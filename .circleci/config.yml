version: 2.1

orbs:
  orb-tools: circleci/orb-tools@10.0

jobs:
  deploy-log:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Send deploy log to loganne
          command: |
            curl https://loganne.l42.eu/events --data '{
              "type":"publishedOrb",
              "source":"lucos_deploy_orb",
              "systemDeployed":"'"$CIRCLE_PROJECT_REPONAME"'",
              "humanReadable":"Published circleci orb '"$CIRCLE_PROJECT_REPONAME"'"
            }' -H "Content-Type: application/json" --fail

  test-latest-tag-push:
    working_directory: /tmp/test-project
    docker:
      - image: cimg/base:current
    steps:
      - setup_remote_docker
      - add_ssh_keys:
          fingerprints:
            - "b7:75:7e:64:66:44:40:06:95:b4:ad:cd:07:a7:6f:08"
      - run:
          name: Populate known_hosts
          command: |
            ssh-keyscan -p 2202 -H creds.l42.eu >> ~/.ssh/known_hosts
          max_auto_reruns: 5
          auto_rerun_delay: 30s
      - run:
          name: Fetch publish credentials
          command: |
            scp -s -P 2202 -o BatchMode=yes docker-deploy@creds.l42.eu:lucos_deploy_orb/publish/.env /dev/stdout >> "$BASH_ENV"
          max_auto_reruns: 5
          auto_rerun_delay: 30s
      - run:
          name: Docker Login
          command: |
            source $BASH_ENV
            echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Create test project
          command: |
            VERSION="test-$(date +%s)"
            echo "export VERSION=$VERSION" >> "$BASH_ENV"
            printf 'FROM alpine:latest\nRUN echo "deploy-orb-test" > /test.txt\n' > Dockerfile
            printf 'services:\n  app:\n    build: .\n    image: lucas42/deploy-orb-test:v%s\n' \
              "$VERSION" > docker-compose.yml
      - run:
          name: Create buildx builder
          command: docker buildx create --use --name test-builder
      - run:
          name: Build and push versioned tag
          command: |
            source $BASH_ENV
            docker buildx bake --set "*.args.VERSION=$VERSION" --push -f docker-compose.yml
      - run:
          name: Create latest tag via imagetools
          command: |
            docker compose config --format json | jq -r '.services[] | select(.build) | .image' | while read img; do
              LATEST="${img%:*}:latest"
              docker buildx imagetools create -t "$LATEST" "$img"
            done
      - run:
          name: Verify both tags exist in registry
          command: |
            VERSIONED_IMG=$(docker compose config --format json | jq -r '.services[] | select(.build) | .image' | head -1)
            LATEST_IMG="${VERSIONED_IMG%:*}:latest"
            echo "Verifying versioned tag: $VERSIONED_IMG"
            docker buildx imagetools inspect "$VERSIONED_IMG"
            echo "Verifying latest tag: $LATEST_IMG"
            docker buildx imagetools inspect "$LATEST_IMG"
            echo "Both tags verified"

workflows:
  test-publish:
    jobs:
      - orb-tools/lint # Lint Yaml files
      - orb-tools/pack: # Pack orb source
          persist-to-workspace: true
      - orb-tools/publish-dev:
          orb-name: lucos/deploy
          context: orb-publishing
          attach-workspace: true
          requires:
            - orb-tools/lint
            - orb-tools/pack
          filters:
            branches:
              ignore:
                - main
      - test-latest-tag-push:
          context: orb-publishing
          requires:
            - orb-tools/publish-dev
          filters:
            branches:
              ignore:
                - main
      - orb-tools/increment:
          context: orb-publishing
          orb-ref: lucos/deploy
          attach-workspace: true
          requires:
            - orb-tools/lint
            - orb-tools/pack
          filters:
            branches:
              only:
                - main
      - deploy-log:
          requires:
            - orb-tools/increment
          filters:
            branches:
              only:
                - main
