version: 2.1

orbs:
  orb-tools: circleci/orb-tools@10.0

jobs:
  deploy-log:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Send deploy log to loganne
          command: |
            curl https://loganne.l42.eu/events --data '{
              "type":"publishedOrb",
              "source":"lucos_deploy_orb",
              "systemDeployed":"'"$CIRCLE_PROJECT_REPONAME"'",
              "humanReadable":"Published circleci orb '"$CIRCLE_PROJECT_REPONAME"'"
            }' -H "Content-Type: application/json" --fail

  test-latest-tag-push:
    docker:
      - image: cimg/base:current
    steps:
      - setup_remote_docker
      - run:
          name: Docker Login
          command: |
            echo "$DOCKERHUB_ACCESS_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Create test project
          command: |
            mkdir -p /tmp/test-project
            VERSION="test-$(date +%s)"
            echo "export VERSION=$VERSION" >> "$BASH_ENV"
            printf 'FROM alpine:latest\nRUN echo "deploy-orb-test" > /test.txt\n' \
              > /tmp/test-project/Dockerfile
            printf 'services:\n  app:\n    build: .\n    image: lucas42/deploy-orb-test:v%s\n' \
              "$VERSION" > /tmp/test-project/docker-compose.yml
      - run:
          name: Create buildx builder
          command: docker buildx create --use --name test-builder
      - run:
          name: Build and push versioned tag
          command: |
            source $BASH_ENV
            cd /tmp/test-project
            docker buildx bake --push -f docker-compose.yml
      - run:
          name: Create latest tag via imagetools (code path that was broken in issue 120)
          command: |
            source $BASH_ENV
            cd /tmp/test-project
            docker compose config --format json | jq -r '.services[] | select(.build) | .image' | while read img; do
              LATEST="${img%:*}:latest"
              docker buildx imagetools create -t "$LATEST" "$img"
            done
      - run:
          name: Verify both tags exist in registry
          command: |
            source $BASH_ENV
            echo "Verifying versioned tag: lucas42/deploy-orb-test:v${VERSION}"
            docker buildx imagetools inspect "lucas42/deploy-orb-test:v${VERSION}"
            echo "Verifying latest tag: lucas42/deploy-orb-test:latest"
            docker buildx imagetools inspect "lucas42/deploy-orb-test:latest"
            echo "Both tags verified"

workflows:
  test-publish:
    jobs:
      - test-latest-tag-push:
      - orb-tools/lint # Lint Yaml files
      - orb-tools/pack: # Pack orb source
          persist-to-workspace: true
      - orb-tools/publish-dev:
          orb-name: lucos/deploy
          context: orb-publishing
          attach-workspace: true
          requires:
            - orb-tools/lint
            - orb-tools/pack
          filters:
            branches:
              ignore:
                - main
      - orb-tools/increment:
          context: orb-publishing
          orb-ref: lucos/deploy
          attach-workspace: true
          requires:
            - orb-tools/lint
            - orb-tools/pack
          filters:
            branches:
              only:
                - main
      - deploy-log:
          requires:
            - orb-tools/increment
          filters:
            branches:
              only:
                - main
