version: 2.1

orbs:
  orb-tools: circleci/orb-tools@10.0
  lucos: lucos/deploy@dev:alpha

jobs:
  deploy-log:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Send deploy log to loganne
          command: |
            curl https://loganne.l42.eu/events --data '{
              "type":"publishedOrb",
              "source":"lucos_deploy_orb",
              "systemDeployed":"'"$CIRCLE_PROJECT_REPONAME"'",
              "humanReadable":"Published circleci orb '"$CIRCLE_PROJECT_REPONAME"'"
            }' -H "Content-Type: application/json" --fail

  test-latest-tag-push:
    working_directory: /tmp/test-project
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Create test project
          command: |
            VERSION="test-$(date +%s)"
            echo "export VERSION=$VERSION" >> "$BASH_ENV"
            echo "export CIRCLE_BRANCH=main" >> "$BASH_ENV"
            printf 'FROM alpine:latest\nRUN echo "deploy-orb-test" > /test.txt\n' > Dockerfile
            printf 'services:\n  app:\n    build: .\n    image: lucas42/deploy-orb-test:v%s\n' \
              "$VERSION" > docker-compose.yml
      - lucos/fetch-publish-creds
      - lucos/publish-docker
      - run:
          name: Verify both tags exist in registry
          command: |
            source $BASH_ENV
            echo "Verifying versioned tag: lucas42/deploy-orb-test:v${VERSION}"
            docker buildx imagetools inspect "lucas42/deploy-orb-test:v${VERSION}"
            echo "Verifying latest tag: lucas42/deploy-orb-test:latest"
            docker buildx imagetools inspect "lucas42/deploy-orb-test:latest"
            echo "Both tags verified"

workflows:
  test-publish:
    jobs:
      - orb-tools/lint # Lint Yaml files
      - orb-tools/pack: # Pack orb source
          persist-to-workspace: true
      - orb-tools/publish-dev:
          orb-name: lucos/deploy
          context: orb-publishing
          attach-workspace: true
          requires:
            - orb-tools/lint
            - orb-tools/pack
          filters:
            branches:
              ignore:
                - main
      - test-latest-tag-push:
          context: orb-publishing
          requires:
            - orb-tools/publish-dev
          filters:
            branches:
              ignore:
                - main
      - orb-tools/increment:
          context: orb-publishing
          orb-ref: lucos/deploy
          attach-workspace: true
          requires:
            - orb-tools/lint
            - orb-tools/pack
          filters:
            branches:
              only:
                - main
      - deploy-log:
          requires:
            - orb-tools/increment
          filters:
            branches:
              only:
                - main
